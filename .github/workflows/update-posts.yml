name: Update posts

on:
  schedule:
    - cron: '0 6 * * *'  # 6am UTC daily
  workflow_dispatch:       # allow manual trigger from GitHub UI

jobs:
  update-posts:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch and parse Substack RSS
        run: |
          python3 - <<'EOF'
          import urllib.request
          import xml.etree.ElementTree as ET
          import json
          import re

          url = 'https://chrispugh.substack.com/feed'
          req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'})
          with urllib.request.urlopen(req) as response:
              xml_content = response.read()

          root = ET.fromstring(xml_content)
          channel = root.find('channel')

          posts = []
          for item in channel.findall('item'):
              title = item.findtext('title', '').strip()
              link = item.findtext('link', '').strip()
              pub_date = item.findtext('pubDate', '').strip()
              description = item.findtext('description', '').strip()

              clean = re.sub(r'<[^>]+>', '', description).strip()
              excerpt = clean[:160].rstrip() + '\u2026' if len(clean) > 160 else clean

              # Extract cover image from media:content or description HTML
              ns = {'media': 'http://search.yahoo.com/mrss/'}
              media = item.find('media:content', ns)
              if media is not None and media.get('url'):
                  image = media.get('url')
              else:
                  img_match = re.search(r'<img[^>]+src=["\']([^"\']+)["\']', description)
                  image = img_match.group(1) if img_match else ''

              posts.append({
                  'title': title,
                  'link': link,
                  'pubDate': pub_date,
                  'excerpt': excerpt,
                  'image': image
              })

          with open('posts.json', 'w') as f:
              json.dump(posts, f, indent=2)

          print(f'Wrote {len(posts)} posts to posts.json')
          EOF

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add posts.json
          git diff --staged --quiet || (git commit -m "Update posts.json" && git push)
